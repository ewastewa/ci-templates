name: Simulation Smoke Test

on:
  workflow_call:
    inputs:
      ros_distro:
        description: ROS 2 distribution name
        type: string
        default: jazzy
      base_image:
        description: Base Docker image with ROS 2 installed
        type: string
        default: ghcr.io/launchpad-build/launchpad-ros2-jazzy:main
      launch_file:
        description: Path to the launch file (relative to workspace)
        type: string
        required: true
      expected_topics:
        description: Comma-separated list of topics that must publish at least one message
        type: string
        required: true
      timeout:
        description: Maximum time in seconds to wait for topics
        type: string
        default: '180'

jobs:
  sim-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout ci-templates for Dockerfile
        uses: actions/checkout@v4
        with:
          repository: launchpad-build/ci-templates
          path: .ci-templates
          sparse-checkout: docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .ci-templates/docker/Dockerfile.ci
          target: build
          build-args: |
            ROS_DISTRO=${{ inputs.ros_distro }}
            BASE_IMAGE=${{ inputs.base_image }}
            PACKAGE_PATH=.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          tags: ci-build:sim

      - name: Create smoke test script
        run: |
          cat > /tmp/smoke-test.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          . /opt/ros/${ROS_DISTRO}/setup.sh
          . /ws/install/setup.sh

          LAUNCH_FILE="$1"
          EXPECTED_TOPICS="$2"
          TIMEOUT="$3"

          ros2 launch ${LAUNCH_FILE} &
          LAUNCH_PID=$!

          sleep 5

          IFS=',' read -ra TOPICS <<< "${EXPECTED_TOPICS}"
          FAILED=0

          for TOPIC in "${TOPICS[@]}"; do
            TOPIC=$(echo "${TOPIC}" | xargs)
            echo "Checking topic: ${TOPIC}"

            HZ_OUTPUT=$(timeout "${TIMEOUT}" ros2 topic hz "${TOPIC}" --window 1 2>&1 | head -3) || true

            if echo "${HZ_OUTPUT}" | grep -q "average rate"; then
              echo "  Topic ${TOPIC} is publishing."
            else
              echo "  Topic ${TOPIC} did not publish within ${TIMEOUT}s."
              FAILED=1
            fi
          done

          kill ${LAUNCH_PID} 2>/dev/null || true
          wait ${LAUNCH_PID} 2>/dev/null || true

          exit ${FAILED}
          SCRIPT
          chmod +x /tmp/smoke-test.sh
        shell: bash

      - name: Run simulation smoke test
        timeout-minutes: ${{ fromJSON(format('{0}', (fromJSON(inputs.timeout) / 60) + 1)) }}
        run: |
          docker run --rm \
            --name sim-smoke-test \
            -e ROS_DISTRO=${{ inputs.ros_distro }} \
            -e DISPLAY=:99 \
            -v /tmp/smoke-test.sh:/ws/smoke-test.sh:ro \
            ci-build:sim \
            bash -c "
              Xvfb :99 -screen 0 1024x768x24 &
              sleep 1
              /ws/smoke-test.sh \
                '${{ inputs.launch_file }}' \
                '${{ inputs.expected_topics }}' \
                '${{ inputs.timeout }}'
            "
        shell: bash

      - name: Collect logs on failure
        if: failure()
        run: |
          CONTAINER_ID=$(docker ps -aq --filter name=sim-smoke-test 2>/dev/null || true)
          if [ -n "${CONTAINER_ID}" ]; then
            docker logs "${CONTAINER_ID}" > sim-smoke-test.log 2>&1 || true
            docker rm "${CONTAINER_ID}" 2>/dev/null || true
          fi
        shell: bash

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sim-smoke-test-logs
          path: sim-smoke-test.log
          if-no-files-found: ignore
