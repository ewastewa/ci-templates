name: Build & Test

on:
  workflow_call:
    inputs:
      ros_distro:
        description: ROS 2 distribution name
        type: string
        default: jazzy
      base_image:
        description: Base Docker image with ROS 2 installed
        type: string
        default: ghcr.io/launchpad-build/launchpad-ros2-jazzy:main
      colcon_build_args:
        description: Extra arguments passed to colcon build
        type: string
        default: ''
      test_timeout:
        description: Timeout for the test step in seconds
        type: string
        default: '300'

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout ci-templates for Dockerfile
        uses: actions/checkout@v4
        with:
          repository: ewastewa/ci-templates
          path: .ci-templates
          sparse-checkout: docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .ci-templates/docker/Dockerfile.ci
          target: test
          build-args: |
            ROS_DISTRO=${{ inputs.ros_distro }}
            BASE_IMAGE=${{ inputs.base_image }}
            PACKAGE_PATH=.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          tags: ci-build:test

      - name: Extract test results
        if: always()
        run: |
          docker create --name test-container ci-build:test
          mkdir -p test_results
          docker cp test-container:/ws/build/. /tmp/build_output 2>/dev/null || true
          find /tmp/build_output -name '*.xml' -path '*/test_results/*' -exec cp {} test_results/ \; 2>/dev/null || true
          docker rm test-container
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test_results/*.xml
          if-no-files-found: warn
