target-version = "py310"
line-length = 100

[lint]
select = [
  "E",      # pycodestyle errors
  "W",      # pycodestyle warnings
  "F",      # pyflakes
  "I",      # isort
  "N",      # pep8-naming
  "UP",     # pyupgrade
  "B",      # flake8-bugbear
  "SIM",    # flake8-simplify
  "RUF",    # ruff-specific rules
]
ignore = [
  "E501",   # line too long (handled by formatter)
]

[lint.isort]
known-first-party = []
known-third-party = ["launch", "launch_ros"]
force-sort-within-sections = true

[format]
quote-style = "single"
indent-style = "space"
